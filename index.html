<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjay S | Aspiring Software Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f8fafc;
            --bg-dark: #020617;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            transition: background-color 0.5s ease;
        }
        .dark body {
            background-color: var(--bg-dark);
        }
        
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
            filter: blur(80px);
            pointer-events: none;
            overflow: hidden;
        }
        .dark .mesh-gradient {
            opacity: 0.2;
        }
        
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            animation: move 25s infinite alternate ease-in-out;
        }
        
        @keyframes move {
            0% { transform: translate(-10%, -10%) rotate(0deg) scale(1); }
            50% { transform: translate(15%, 5%) rotate(180deg) scale(1.1); }
            100% { transform: translate(-5%, 15%) rotate(360deg) scale(1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* Smooth Modal Animations */
        @keyframes modalOverlayIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(12px); }
        }

        @keyframes modalOverlayOut {
            from { opacity: 1; backdrop-filter: blur(12px); }
            to { opacity: 0; backdrop-filter: blur(0px); }
        }

        @keyframes modalContentIn {
            from { 
                opacity: 0; 
                transform: scale(0.92) translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            }
        }

        @keyframes modalContentOut {
            from { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            }
            to { 
                opacity: 0; 
                transform: scale(0.96) translateY(10px); 
            }
        }

        .animate-modal-overlay {
            animation: modalOverlayIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-modal-overlay-out {
            animation: modalOverlayOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-modal-content {
            animation: modalContentIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .animate-modal-content-out {
            animation: modalContentOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#3b82f6',
                            600: '#2563eb',
                        },
                        slate: {
                            950: '#020617',
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 12s linear infinite',
                    }
                }
            }
        }
    </script>

</head>
<body class="text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden custom-scrollbar">
    <div class="mesh-gradient">
        <div class="blob bg-blue-300/40 top-0 left-0"></div>
        <div class="blob bg-indigo-400/30 bottom-0 right-0" style="animation-delay: -7s;"></div>

    </div>

</html>
